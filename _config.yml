locale: "en-AU"
site_theme: "mint"
description: &description "Methane analytics and data science portfolio"
url: "https://jwschmidberger.github.io"
baseurl: ""
repository: "jwschmidberger/jwschmidberger.github.io"
permalink: /blog/:year/:month/:day/:title/

author:
  avatar: "portrait_jws.jpg"
  name: "Jason Schmidberger"
  bio: "Data scientist focused on methane emissions analytics, probabilistic modelling, and stakeholder-ready insight."
  location: "Alnwick, United Kingdom"
  email: "jason.schmidberger@gmail.com"
  github: "jwschmidberger"
  linkedin: "jwschmidberger"
  googlescholar: "https://scholar.google.com/citations?user=pMLL7IoAAAAJ"

markdown: kramdown
highlighter: rouge
timezone: Australia/Sydney

remote_theme: "mmistakes/minimal-mistakes@4.24.0"

plugins:
  - jekyll-remote-theme
  - jekyll-feed
  - jekyll-seo-tag
  - jekyll-sitemap
  - jekyll-include-cache

collections:
  posts:
    output: true
    permalink: /blog/:year/:month/:day/:title/
  projects:
    output: true
    permalink: /projects/:title/

defaults:
  - scope:
      path: ""
      type: "posts"
    values:
      layout: single
      author_profile: true
  - scope:
      path: ""
      type: "projects"
    values:
      layout: single
      author_profile: true
  - scope:
      path: ""
    values:
      layout: single
      author_profile: true

sass:
  sass_dir: _sass
  style: compressed

exclude:
  - node_modules
  - vendor
  - README.md
  - Gemfile.lock
  - .sass-cache
  - .jekyll-cache
  - .bundle
  - package.json
  - yarn.lock
  - pdfs
  - reveal.js
  - ntbooks
